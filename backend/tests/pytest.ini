[pytest]
addopts = -v --cov=models tests/ --cov-report term-missing
markers =
    auth: testes dos endpoints do módulo auth
    login: testes do endpoint do fluxo de autenticação
    refresh: testes do endpoint do fluxo de renovação de tokens
    data: testes dos endpoints que retornam dados das tabelas
    estacoes: testes do endpoint estacoes
    autonomia_restabelecimento: testes do endpoint autonomia-restabelecimento
    autonomia_inventario: testes do endpoint autonomia-inventario
    indisponibilidades: testes do endpoint indisponibilidades
    disponibilidade: testes do endpoint disponibilidade
    pontuacoes: testes do endpoint pontuacoes
    features: testes do endpoint features
    alocacoes: testes do endpoint alocacoes
    baterias: testes dos endpoints baterias
    engine: testes dos endpoints do módulo engine
    load_data: testes do endpoint load-data
    feature_engineering: testes do endpoint feature-engineering
    training_data: testes do endpoint training-data
    full_pipeline: testes dos endpoints do motor de alocacao